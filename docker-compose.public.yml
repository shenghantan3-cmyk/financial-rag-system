version: '3.8'

# 公网部署配置 - 使用 Cloudflare Tunnel
# 运行: docker-compose -f docker-compose.yml -f docker-compose.public.yml up -d

services:
  # Financial RAG API + Nginx
  financial-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-rag
    ports:
      - "8000:8000"
      - "80:80"
      - "443:443"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui:/var/www/html:ro
    restart: unless-stopped
    depends_on:
      - cloudflared
    
  # Cloudflare Tunnel - 公网暴露
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate --edge-ip-version auto run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    environment:
      - TZ=UTC

networks:
  default:
    name: financial-rag-network